<!DOCTYPE html>
<html>
<head>
    <title>Emergency Mesh Network</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">🚨</div>
            <h1>Emergency Alert</h1>
            <p class="subtitle">Offline-first mesh network for disaster communication</p>
        </header>

        <!-- Status Badge -->
        <div id="status" class="status-badge">
            <span class="indicator"></span>
            <span class="text">Checking connection...</span>
        </div>

        <!-- Warning Box -->
        <div class="warning-box">
            <strong>⚠️ No internet?</strong> Messages save locally and auto-sync when connection returns.
        </div>

        <!-- Main Form -->
        <form id="form">
            <div class="field">
                <label for="msg">Emergency Message *</label>
                <textarea id="msg" placeholder="Describe your emergency situation..." maxlength="500" required></textarea>
                <div class="char-count"><span id="chars">0</span>/500</div>
            </div>

            <div class="field">
                <label for="loc">Location (optional)</label>
                <input id="loc" type="text" placeholder="Village, landmark, or coordinates">
            </div>

            <button type="submit" class="send-btn">
                <span>📤</span> SEND EMERGENCY ALERT
            </button>
        </form>

        <!-- Queue Indicator -->
        <div id="queue-box" class="queue-box" style="display:none">
            <div class="queue-info">
                <span>📡 <strong id="queue-count">0</strong> message(s) pending</span>
                <button onclick="showQueue()" class="small-btn">View</button>
            </div>
        </div>

        <!-- History Section -->
        <section class="history">
            <h2>📋 Recent Messages</h2>
            <div id="history-list"></div>
        </section>

        <!-- Queue Modal -->
        <div id="modal" class="modal" onclick="hideQueue()">
            <div class="modal-content" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <h3>📡 Pending Queue</h3>
                    <button onclick="hideQueue()" class="close-btn">&times;</button>
                </div>
                <div id="queue-list" class="queue-list"></div>
                <div class="modal-footer">
                    <button onclick="clearQueue()" class="danger-btn">Clear All</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
